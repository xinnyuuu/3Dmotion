# Live capture configuration placeholder.

imu:
  head:
    sensor_id: head_imu
    transport: serial_adapter
    adapter_port: /dev/ttyACM1
    address: C4:65:91:2C:E2:20
    output: data/raw/head_imu.jsonl
    timestamp_source: reconstructed_200hz_from_host_receive
  wrist:
    sensor_id: wrist_imu
    transport: serial_adapter
    adapter_port: /dev/ttyACM0
    address: C5:64:B9:44:66:D6
    output: data/raw/wrist_imu.jsonl
    timestamp_source: reconstructed_200hz_from_host_receive

cameras:
  format: MJPG
  width: 1600
  height: 1200
  target_fps: 25
  min_expected_fps: 20
  output_dir: data/raw/quad_camera_session
  timestamp_source: host_retrieve
  sources:
    - camera_id: C0
      source: 0
      role: left_ear
    - camera_id: C1
      source: 1
      role: front_left
    - camera_id: C2
      source: 2
      role: front_right
    - camera_id: C3
      source: 3
      role: right_ear

sync:
  prototype_clock: host_monotonic
  imu_serial_timestamp_mode: reconstructed_rate
  imu_nominal_sample_rate_hz: 200
  max_camera_group_skew_us_warn: 5000
  timestamp_fields:
    - timestamp_monotonic_ns
    - timestamp_unix_ns
    - timestamp_source
