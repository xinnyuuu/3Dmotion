# Headset camera calibration.
#
# Convention:
#   T_H_C maps camera-frame points into headset frame H.
#
# Intrinsics below are Mei/omni calibration results. `xi` is part of the
# projection model and must be preserved. OpenVINS in this repo currently only
# supports pinhole-radtan/equidistant, so its config generator exports an
# explicit compatibility view from these same values.

camera_defaults:
  image_size: [1600, 1200]
  camera_model: omni
  projection_model: mei
  distortion_model: radtan

camera_priority:
  # Main overlapping VIO cameras first, side cameras second.
  - C1
  - C2
  - C0
  - C3

