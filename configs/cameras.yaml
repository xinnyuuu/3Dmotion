      - [1348.160986640322, 0.0, 961.3325845446848]
      - [0.0, 1355.4095530242657, 552.4958197622212]
      - [0.0, 0.0, 1.0]
    # Fill with OpenCV distortion coefficients. Use [0, 0, 0, 0, 0] for ideal/debug cameras.
