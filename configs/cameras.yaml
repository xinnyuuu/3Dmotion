# Headset camera calibration.
#
# Four cameras currently share the same intrinsics/distortion. Per-camera
# entries may override these defaults later if calibration shows differences.

camera_defaults:
  image_size: [1920, 1080]
  intrinsics:
    - [1395.67977407088, 0.0, 961.846316575729]
    - [0.0, 1394.4219378913047, 519.407320308343]
    - [0.0, 0.0, 1.0]
  distortion:
    - 0.01312118060792128
    - -0.10159855102499989
    - -0.0007627935251426124
    - 0.0001588212560533957
    - 0.0440660655430788

cameras:
  C0:
    role: left_ear
    # Convention: T_H_C maps camera-frame points into headset frame H.
    # May be a 4x4 matrix or [x, y, z, yaw_deg, pitch_deg, roll_deg].
    T_H_C: null
  C1:
    role: front_left
    # Convention: T_H_C maps camera-frame points into headset frame H.
    # May be a 4x4 matrix or [x, y, z, yaw_deg, pitch_deg, roll_deg].
    T_H_C: null
  C2:
    role: front_right
    # Convention: T_H_C maps camera-frame points into headset frame H.
    # May be a 4x4 matrix or [x, y, z, yaw_deg, pitch_deg, roll_deg].
    T_H_C: null
  C3:
    role: right_ear
    # Convention: T_H_C maps camera-frame points into headset frame H.
    # May be a 4x4 matrix or [x, y, z, yaw_deg, pitch_deg, roll_deg].
    T_H_C: null
