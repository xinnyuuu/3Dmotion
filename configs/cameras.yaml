# Headset camera calibration.
#
# Placeholder schema. Replace these placeholder intrinsics with
# FourHeadIntrinsics/scripts/export_3dmotion_cameras_yaml.py after calibrating
# the exact recording resolution.

camera_defaults:
  image_size: [1600, 1200]
  camera_model: fisheye
  distortion_model: equidistant
  intrinsics:
    - [800.0, 0.0, 800.0]
    - [0.0, 800.0, 600.0]
    - [0.0, 0.0, 1.0]
  distortion:
    - 0.0
    - 0.0
    - 0.0
    - 0.0

cameras:
  C0:
    role: left_ear
    # Convention: T_H_C maps camera-frame points into headset frame H.
    # May be a 4x4 matrix or [x, y, z, yaw_deg, pitch_deg, roll_deg].
    T_H_C: null
  C1:
    role: front_left
    # Convention: T_H_C maps camera-frame points into headset frame H.
    # May be a 4x4 matrix or [x, y, z, yaw_deg, pitch_deg, roll_deg].
    T_H_C: null
  C2:
    role: front_right
    # Convention: T_H_C maps camera-frame points into headset frame H.
    # May be a 4x4 matrix or [x, y, z, yaw_deg, pitch_deg, roll_deg].
    T_H_C: null
  C3:
    role: right_ear
    # Convention: T_H_C maps camera-frame points into headset frame H.
    # May be a 4x4 matrix or [x, y, z, yaw_deg, pitch_deg, roll_deg].
    T_H_C: null
