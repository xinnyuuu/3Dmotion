# Wristband geometry placeholder.

tag_family: tag16h5
tag_size_m: 0.028
flat_to_flat_m: 0.092
center_offset_m: 0.046

tag_order:
  - 19
  - 16
  - 17
  - 18
  - 15
  - 14

# Fallback signs mirror the current AprilTag prototype convention:
# local -Z points from a visible tag face into the bracelet body.
ring_offset_sign: -1
ring_order_direction: 1
fallback_orientation_mode: tag_orientation

# Fill with calibrated rigid transforms from each tag frame to wristband frame
# when available. Convention: T_Ti_B maps wristband-frame points into tag-frame
# coordinates. Each value may be a 4x4 matrix or [x, y, z, yaw_deg, pitch_deg, roll_deg].
tag_to_wrist_transforms: {}
